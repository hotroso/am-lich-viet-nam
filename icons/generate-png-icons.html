<!DOCTYPE html>
<html>
<head>
    <title>Generate PNG Icons for Âm Lịch PWA</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        canvas { border: 1px solid #ccc; margin: 10px; }
        .icon-row { display: flex; align-items: center; gap: 20px; margin: 20px 0; }
        a { display: inline-block; margin-top: 10px; padding: 8px 16px; background: #b71c1c; color: white; text-decoration: none; border-radius: 4px; }
    </style>
</head>
<body>
    <h1>Generate PNG Icons</h1>
    <p>Right-click each icon and "Save image as..." or click the download links below.</p>
    
    <div class="icon-row">
        <div>
            <h3>180x180 (apple-touch-icon)</h3>
            <canvas id="c180" width="180" height="180"></canvas>
            <br><a id="dl180" download="apple-touch-icon-180.png">Download 180x180</a>
        </div>
        <div>
            <h3>192x192</h3>
            <canvas id="c192" width="192" height="192"></canvas>
            <br><a id="dl192" download="icon-192.png">Download 192x192</a>
        </div>
        <div>
            <h3>512x512</h3>
            <canvas id="c512" width="512" height="512"></canvas>
            <br><a id="dl512" download="icon-512.png">Download 512x512</a>
        </div>
    </div>

    <script>
        function drawIcon(canvas) {
            const ctx = canvas.getContext('2d');
            const size = canvas.width;
            const scale = size / 192;

            // Background circle
            ctx.beginPath();
            ctx.arc(size/2, size/2, size/2, 0, Math.PI * 2);
            ctx.fillStyle = '#b71c1c';
            ctx.fill();

            // Chinese character 陰
            ctx.fillStyle = 'white';
            ctx.font = `bold ${60 * scale}px serif`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('陰', size/2, size * 0.42);

            // Text "Âm Lịch VN"
            ctx.font = `${18 * scale}px sans-serif`;
            ctx.fillText('Âm Lịch VN', size/2, size * 0.67);
        }

        ['180', '192', '512'].forEach(s => {
            const canvas = document.getElementById('c' + s);
            drawIcon(canvas);
            document.getElementById('dl' + s).href = canvas.toDataURL('image/png');
        });
    </script>
</body>
</html>
